<!DOCTYPE html>
<html>
<head>
<title>Smart Expense Tracker</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

.box{
    max-width:400px;
    background:white;
    padding:20px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
}

ul{
    padding:0;
}

li{
    list-style:none;
    background:#eee;
    margin-top:5px;
    padding:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

li button{
    background:transparent;
    border:none;
    color:red;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Smart Expense Tracker</h2>

<input id="name" placeholder="Expense name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Other</option>
</select>

<button onclick="addExpense()">Add Expense</button>

<h3>Total: ₹ <span id="total">0</span></h3>
<button onclick="printReport()">Print Report</button>
<input id="search" placeholder="Search expense..." onkeyup="filterExpenses()">

<ul id="list"></ul>
</div>

<script>
let expenses = [];
let total = 0;

function addExpense(){
    let name = document.getElementById("name").value;
    let amount = Number(document.getElementById("amount").value);
    let category = document.getElementById("category").value;

    if(name === "" || amount <= 0){
        alert("Enter valid expense");
        return;
    }

    let expense = {name, amount, category};
    expenses.push(expense);

    let li = document.createElement("li");
    li.innerHTML = `${name} - ₹${amount} (${category}) 
        <button onclick="this.parentElement.remove(); updateTotal(-${amount})">❌</button>`;

    document.getElementById("list").appendChild(li);

    total += amount;
    document.getElementById("total").innerText = total;

    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
}

function updateTotal(val){
    total += val;
    document.getElementById("total").innerText = total;
}

function filterExpenses(){
    let text = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll("#list li").forEach(li=>{
        li.style.display = li.innerText.toLowerCase().includes(text) ? "flex" : "none";
    });
}
function printReport(){

// sort highest amount first
let sorted = [...expenses].sort((a,b)=>b.amount - a.amount);

let html = `
<h2 style="text-align:center">Expense Report</h2>
<table border="1" cellpadding="8" cellspacing="0" width="100%">
<tr>
<th>Expense</th>
<th>Category</th>
<th>Amount</th>
</tr>
`;

sorted.forEach(e=>{
html += `
<tr>
<td>${e.name}</td>
<td>${e.category}</td>
<td>₹${e.amount}</td>
</tr>
`;
});

let total = sorted.reduce((s,e)=>s+Number(e.amount),0);

html += `
<tr>
<th colspan="2">Total</th>
<th>₹${total}</th>
</tr>
</table>
`;

let win = window.open("");
win.document.write(html);
win.print();
}

</script>

</body>
</html>
