<!DOCTYPE html>
<html>
<head>
<title>Expense Report</title>
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
.box{
    max-width:500px;
    background:white;
    padding:20px;
    margin:auto;
    border-radius:10px;
}
table{
    width:100%;
    border-collapse: collapse;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ccc;
}
.total{
    font-size:20px;
    font-weight:bold;
    border-top:3px solid black;
}
button{
    width:100%;
    padding:10px;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="box">
<h2>Expense Report</h2>

<table id="table">
<tr>
<th>Expense</th>
<th>Amount</th>
</tr>
</table>

<p class="total">Total: ₹ <span id="total"></span></p>

<button onclick="window.print()">Print / Save PDF</button>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// Sort highest first
expenses.sort((a,b)=> b.amount - a.amount);

let total = 0;
let table = document.getElementById("table");

expenses.forEach(e=>{
    let row = table.insertRow();
    row.insertCell(0).innerText = e.name;
    row.insertCell(1).innerText = "₹" + e.amount;
    total += e.amount;
});

document.getElementById("total").innerText = total;
</script>

</body>
</html>
